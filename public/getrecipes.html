<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Recipes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans m-5">
    <h1 class="text-3xl text-gray-800 mb-4">Get Recipes</h1>
    <form id="addRecipeForm" class="mb-5">
        <input type="text" id="food" placeholder="Food name" class="p-2 border border-gray-300 rounded mr-2" required>
        <input type="text" id="ingredients" placeholder="Ingredients" class="p-2 border border-gray-300 rounded mr-2" required>
        <button type="submit" class="bg-blue-500 text-white p-2 rounded">Save Recipe</button>
    </form>
    <input type="text" id="search" class="mb-5 p-2 w-80 border border-gray-300 rounded" placeholder="Search recipes by name or ingredients..." onkeyup="filterRecipes()">
    <ul id="recipes" class="list-none p-0"></ul>

    <script src="getrecipes.js"></script>
</body>
</html>
